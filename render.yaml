services:
  - type: web
    name: nlbb-backend
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://admin.nlbb.co.ke,https://nlbb-admin.vercel.app,http://localhost:5181,http://127.0.0.1:5181
      - key: TRUST_PROXY
        value: "1"
      - key: PAYMENTS_ENABLED
        value: "true"
      - key: MPESA_ENABLED
        value: "true"
      - key: MPESA_SIMULATE
        value: "false"
      - key: PASSWORD_RESET_REDIRECT_URL
        value: nlbb://reset-password
      - key: SUPABASE_USER_AVATAR_BUCKET
        value: user-avatars
      - key: SUPABASE_PROVIDER_AVATAR_BUCKET
        value: provider-avatars
      - key: SUPABASE_PROVIDER_COVER_BUCKET
        value: provider-covers
      - key: SUPABASE_PROVIDER_GALLERY_BUCKET
        value: provider-gallery
      - key: ADMIN_API_KEY_ENABLED
        value: "false"
      - key: REQUIRE_ACTIVE_USER
        value: "true"
      - key: APP_BASE_URL
        fromService:
          type: web
          name: nlbb-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_MAX
        value: "10"
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_REPLY_TO
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_FALLBACK_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_REQUIRE_TLS
        sync: false
      - key: SMTP_IGNORE_TLS
        sync: false
      - key: SMTP_TLS_REJECT_UNAUTHORIZED
        sync: false
      - key: SMTP_CONNECTION_TIMEOUT_MS
        sync: false
      - key: SMTP_GREETING_TIMEOUT_MS
        sync: false
      - key: SMTP_SOCKET_TIMEOUT_MS
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: MPESA_ENV
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_CALLBACK_SECRET
        sync: false
      - key: MPESA_INITIATOR_NAME
        sync: false
      - key: MPESA_SECURITY_CREDENTIAL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
